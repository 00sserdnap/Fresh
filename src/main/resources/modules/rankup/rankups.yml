# ====================================================================================================
#                               ETHERIUM CORE - CONFIGURACIÓN DE RANGOS
# ====================================================================================================
# INDICE DE REQUISITOS DISPONIBLES QUE PUEDES MEZCLAR:
# - money: <número>               -> Dinero de la cuenta (Requiere Vault instalado).
# - playtime_hours: <número>       -> Horas de juego del jugador extraídas de las estadísticas internas.
# - player_kills: <número>         -> Cantidad de asesinatos en PvP a otros jugadores.
# - blocks_mine:                   -> Bloques que debe romper/picar.
#     MATERIAL: <número>           -> El material debe coincidir con el nombre de Bukkit en MAYÚSCULAS.
# - blocks_place:                  -> Bloques que debe colocar.
#     MATERIAL: <número>           -> El material debe coincidir con el nombre de Bukkit en MAYÚSCULAS.
# - mob_kills:                     -> Entidades/Mobs que debe matar.
#     ENTITY_TYPE: <número>        -> El tipo de entidad debe coincidir con el nombre de Bukkit en MAYÚSCULAS.
# ====================================================================================================

# ==========================================
# RANGOS INICIALES (Prestigio 0)
# ==========================================
prestige_0:
  ranks:
    1:
      prefix: "&8[&aAventurero&8]"
      requirements:
        money: 5000
      rewards_lore:
        - "Rango Principiante"
        - "&7Ganas: &aAcceso al comando /kit diario"
      commands:
        - "lp user %player% parent add rango1"
        - "broadcast &b&lFresh &8» &e%player% &fsubió al &aRango #1&f."
    2:
      prefix: "&8[&eExplorador&8]"
      requirements:
        money: 15000
      rewards_lore:
        - "Rango Aventurero"
        - "&7Ganas: &a+$500 monedas extra"
      commands:
        - "lp user %player% parent add rango2"
        - "eco give %player% 500"
    3:
      prefix: "&8[&bConstructor&8]"
      requirements:
        money: 30000
      rewards_lore:
        - "Rango Constructor"
      commands:
        - "lp user %player% parent add rango3"
    4:
      prefix: "&8[&cCazador&8]"
      requirements:
        money: 60000
      rewards_lore:
        - "Rango Cazador"
      commands:
        - "lp user %player% parent add rango4"
    5:
      prefix: "&8[&6Élite&8]"
      requirements:
        money: 120000
      rewards_lore:
        - "Rango Élite &7(Máximo del Prestigio 0)"
        - "&7¡Ya puedes usar el botón de Prestigio!"
      commands:
        - "lp user %player% parent add rango5"

# ==========================================
# RANGOS TRAS SUBIR A PRESTIGIO 1
# ==========================================
prestige_1:
  ranks:
    1:
      prefix: "&8[&cGladiador&8]"
      requirements:
        money: 200000
        playtime_hours: 15
        blocks_mine:
          NETHER_QUARTZ_ORE: 100
      rewards_lore:
        - "Rango Gladiador [P1]"
      commands:
        - "lp user %player% parent add rango_p1_1"
    2:
      prefix: "&8[&4Berserker&8]"
      requirements:
        money: 450000
        player_kills: 20
        mob_kills:
          BLAZE: 50
          WITHER_SKELETON: 10
      rewards_lore:
        - "Rango Berserker [P1]"
      commands:
        - "lp user %player% parent add rango_p1_2"

# ==========================================
# RANGOS TRAS SUBIR A PRESTIGIO 2
# ==========================================
prestige_2:
  ranks:
    1:
      prefix: "&8[&dInmortal&8]"
      requirements:
        money: 1000000
        playtime_hours: 30
        blocks_mine:
          ANCIENT_DEBRIS: 5
        mob_kills:
          WITHER: 1
      rewards_lore:
        - "Rango Inmortal [P2]"
      commands:
        - "lp user %player% parent add rango_p2_1"